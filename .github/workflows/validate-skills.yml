name: Validate Skills

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test validator
        run: python -m unittest discover .claude/skills/pr-review/scripts -p 'test_*.py'
      - name: Validate skills
        run: python .claude/skills/pr-review/scripts/validate_skills.py
